name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION=$(git describe --tags --always --dirty)
          EXT=""
          [[ "${{ matrix.goos }}" == "windows" ]] && EXT=".exe"
          OUTNAME="proxygate-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}${EXT}"

          go build \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o "${OUTNAME}" \
            ./cmd/proxygate/

          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            zip "${OUTNAME%.exe}.zip" "${OUTNAME}"
            echo "ARTIFACT=${OUTNAME%.exe}.zip" >> "$GITHUB_ENV"
          else
            gzip -k "${OUTNAME}"
            echo "ARTIFACT=${OUTNAME}.gz" >> "$GITHUB_ENV"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT }}
          path: ${{ env.ARTIFACT }}
          if-no-files-found: error
          retention-days: 1

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA256 checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
